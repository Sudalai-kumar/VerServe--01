name: Build and Push to ACR

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to ACR
      uses: azure/docker-login@v1
      with:
        login-server: gnchennai1772539567.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and Push Backend
      run: |
        docker build -t gnchennai1772539567.azurecr.io/gn-backend:${{ github.sha }} \
                     -t gnchennai1772539567.azurecr.io/gn-backend:latest ./backend
        docker push gnchennai1772539567.azurecr.io/gn-backend:${{ github.sha }}
        docker push gnchennai1772539567.azurecr.io/gn-backend:latest

    - name: Build and Push Frontend
      run: |
        docker build --build-arg VITE_API_URL=https://goodneighbor-api.azurewebsites.net \
                     -t gnchennai1772539567.azurecr.io/gn-frontend:${{ github.sha }} \
                     -t gnchennai1772539567.azurecr.io/gn-frontend:latest ./frontend
        docker push gnchennai1772539567.azurecr.io/gn-frontend:${{ github.sha }}
        docker push gnchennai1772539567.azurecr.io/gn-frontend:latest
